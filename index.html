<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CosmicWallet</title>
    <style>
        /* Basic styling */
        body { font-family: Arial, sans-serif; margin: 20px; }
        .container { max-width: 600px; margin: 0 auto; }
        .section-container { display: flex; flex-wrap: wrap; gap: 10px; }
        .link-card { padding: 10px; background: #eee; border-radius: 4px; text-align: center; width: 100%; }
        .button { padding: 10px 20px; background: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; }
        .button:hover { background: #0056b3; }
    </style>
</head>
<body>
    <div class="container">
        <h1>CosmicWallet</h1>
        <button class="button" onclick="generateAddress()">Generate Address</button>
        <button class="button" onclick="connectWallet()">Connect Wallet</button>
        <button class="button" onclick="switchChain('BSC')">Switch to BSC</button>
        <button class="button" onclick="switchChain('ETH')">Switch to ETH</button>

        <div id="wallet-info">
            <h2>Your Wallet</h2>
            <p id="wallet-address">Address: </p>
            <p id="mnemonic">Mnemonic: </p>
            <button class="button" onclick="copyToClipboard('wallet-address')">Copy Address</button>
            <button class="button" onclick="copyToClipboard('mnemonic')">Copy Mnemonic</button>
        </div>

        <div id="balance-section">
            <h2>Balance</h2>
            <p id="balance">Balance: </p>
        </div>

        <div id="send-section">
            <h2>Send CosmicCoin</h2>
            <form id="send-form" onsubmit="sendCosmicCoin(event)">
                <label for="recipient-address">Recipient Address:</label>
                <input type="text" id="recipient-address" required>
                <label for="amount">Amount:</label>
                <input type="number" id="amount" required>
                <button type="submit" class="button">Send</button>
            </form>
        </div>

        <div id="dappsSection" class="section-container">
            <h2 class="text-xl font-bold mb-4">DApps</h2>
            <a href="https://app.uniswap.org/" target="_blank" class="link-card">Uniswap</a>
            <a href="https://pancakeswap.finance" target="_blank" class="link-card">PancakeSwap</a>
            <a href="https://app.aave.com/" target="_blank" class="link-card">Aave</a>
            <a href="https://app.compound.finance/" target="_blank" class="link-card">Compound</a>
            <a href="https://www.geckoterminal.com" target="_blank" class="link-card">GeckoTerminal</a>
            <a href="https://www.coinscope.co" target="_blank" class="link-card">Coinscope</a>
            <a href="https://www.dexview.com" target="_blank" class="link-card">DexView</a>
            <a href="https://www.dextools.io/" target="_blank" class="link-card">DexTools</a>
            <a href="https://top100token.com/" target="_blank" class="link-card">Top 100 Token</a>
        </div>

        <div id="swapSection" class="section-container">
            <h2 class="text-xl font-bold mb-4">Swap</h2>
            <a href="https://app.uniswap.org/" target="_blank" class="link-card">Uniswap</a>
            <a href="https://app.1inch.io/" target="_blank" class="link-card">1inch</a>
            <a href="https://app.sushi.com/" target="_blank" class="link-card">SushiSwap</a>
        </div>

        <div id="tradeSection" class="section-container">
            <h2 class="text-xl font-bold mb-4">Trade</h2>
            <a href="https://www.binance.com/" target="_blank" class="link-card">Binance</a>
            <a href="https://pro.coinbase.com/" target="_blank" class="link-card">Coinbase</a>
            <a href="https://www.kraken.com/" target="_blank" class="link-card">Kraken</a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/web3@1.6.1/dist/web3.min.js"></script>
    <script>
        let web3;
        const cosmicCoinAddress = "0x95e27971C1c72717612617D49045AAf947Be518C";
        const cosmicCoinAbi = [ /* [{"inputs":[{"internalType":"string","name":"name_","type":"string"},{"internalType":"string","name":"symbol_","type":"string"}],"stateMutability":"nonpayable","type":"constructor"},{"anonymous":false,"inputs":[{"indexed":true,"internalType":"address","name":"owner","type":"address"},{"indexed":true,"internalType":"address","name":"spender","type":"address"},{"indexed":false,"internalType":"uint256","name":"value","type":"uint256"}],"name":"Approval","type":"event"},{"anonymous":false,"inputs":[{"indexed":true,"internalType":"address","name":"from","type":"address"},{"indexed":true,"internalType":"address","name":"to","type":"address"},{"indexed":false,"internalType":"uint256","name":"value","type":"uint256"}],"name":"Transfer","type":"event"},{"inputs":[{"internalType":"address","name":"owner","type":"address"},{"internalType":"address","name":"spender","type":"address"}],"name":"allowance","outputs":[{"internalType":"uint256","name":"","type":"uint256"}],"stateMutability":"view","type":"function"},{"inputs":[{"internalType":"address","name":"spender","type":"address"},{"internalType":"uint256","name":"amount","type":"uint256"}],"name":"approve","outputs":[{"internalType":"bool","name":"","type":"bool"}],"stateMutability":"nonpayable","type":"function"},{"inputs":[{"internalType":"address","name":"account","type":"address"}],"name":"balanceOf","outputs":[{"internalType":"uint256","name":"","type":"uint256"}],"stateMutability":"view","type":"function"},{"inputs":[],"name":"decimals","outputs":[{"internalType":"uint8","name":"","type":"uint8"}],"stateMutability":"view","type":"function"},{"inputs":[{"internalType":"address","name":"spender","type":"address"},{"internalType":"uint256","name":"subtractedValue","type":"uint256"}],"name":"decreaseAllowance","outputs":[{"internalType":"bool","name":"","type":"bool"}],"stateMutability":"nonpayable","type":"function"},{"inputs":[],"name":"generator","outputs":[{"internalType":"string","name":"","type":"string"}],"stateMutability":"pure","type":"function"},{"inputs":[{"internalType":"address","name":"spender","type":"address"},{"internalType":"uint256","name":"addedValue","type":"uint256"}],"name":"increaseAllowance","outputs":[{"internalType":"bool","name":"","type":"bool"}],"stateMutability":"nonpayable","type":"function"},{"inputs":[],"name":"name","outputs":[{"internalType":"string","name":"","type":"string"}],"stateMutability":"view","type":"function"},{"inputs":[],"name":"symbol","outputs":[{"internalType":"string","name":"","type":"string"}],"stateMutability":"view","type":"function"},{"inputs":[],"name":"totalSupply","outputs":[{"internalType":"uint256","name":"","type":"uint256"}],"stateMutability":"view","type":"function"},{"inputs":[{"internalType":"address","name":"to","type":"address"},{"internalType":"uint256","name":"amount","type":"uint256"}],"name":"transfer","outputs":[{"internalType":"bool","name":"","type":"bool"}],"stateMutability":"nonpayable","type":"function"},{"inputs":[{"internalType":"address","name":"from","type":"address"},{"internalType":"address","name":"to","type":"address"},{"internalType":"uint256","name":"amount","type":"uint256"}],"name":"transferFrom","outputs":[{"internalType":"bool","name":"","type":"bool"}],"stateMutability":"nonpayable","type":"function"},{"inputs":[],"name":"version","outputs":[{"internalType":"string","name":"","type":"string"}],"stateMutability":"view","type":"function"}] */ ];
        let currentChain = 'BSC'; // Default to Binance Smart Chain

        async function generateAddress() {
            const wallet = ethers.Wallet.createRandom();
            document.getElementById('wallet-address').innerText = `Address: ${wallet.address}`;
            document.getElementById('mnemonic').innerText = `Mnemonic: ${wallet.mnemonic.phrase}`;
            storeEncryptedData(wallet.mnemonic.phrase);
        }

        async function storeEncryptedData(mnemonic) {
            const password = prompt("Enter a password to encrypt the data:");
            if (password) {
                const { encrypted, iv } = await encryptData(mnemonic, password);
                localStorage.setItem('encryptedMnemonic', arrayBufferToBase64(encrypted));
                localStorage.setItem('iv', arrayBufferToBase64(iv));
                alert("Mnemonic stored securely.");
            }
        }

        async function encryptData(data, password) {
            const enc = new TextEncoder();
            const key = await window.crypto.subtle.importKey(
                "raw", 
                enc.encode(password), 
                { name: "PBKDF2" }, 
                false, 
                ["deriveKey"]
            );
            const derivedKey = await window.crypto.subtle.deriveKey(
                {
                    name: "PBKDF2",
                    salt: enc.encode("salt"),
                    iterations: 100000,
                    hash: "SHA-256"
                },
                key,
                { name: "AES-GCM", length: 256 },
                false,
                ["encrypt"]
            );
            const iv = window.crypto.getRandomValues(new Uint8Array(12));
            const encrypted = await window.crypto.subtle.encrypt(
                { name: "AES-GCM", iv },
                derivedKey,
                enc.encode(data)
            );
            return { encrypted, iv };
        }

        async function decryptData(encrypted, iv, password) {
            const enc = new TextEncoder();
            const key = await window.crypto.subtle.importKey(
                "raw", 
                enc.encode(password), 
                { name: "PBKDF2" }, 
                false, 
                ["deriveKey"]
            );
            const derivedKey = await window.crypto.subtle.deriveKey(
                {
                    name: "PBKDF2",
                    salt: enc.encode("salt"),
                    iterations: 100000,
                    hash: "SHA-256"
                },
                key,
                { name: "AES-GCM", length: 256 },
                false,
                ["decrypt"]
            );
            const decrypted = await window.crypto.subtle.decrypt(
                { name: "AES-GCM", iv },
                derivedKey,
                base64ToArrayBuffer(encrypted)
            );
            return new TextDecoder().decode(decrypted);
        }

        function arrayBufferToBase64(buffer) {
            let binary = '';
            const bytes = new Uint8Array(buffer);
            const len = bytes.byteLength;
            for (let i = 0; i < len; i++) {
                binary += String.fromCharCode(bytes[i]);
            }
            return window.btoa(binary);
        }

        function base64ToArrayBuffer(base64) {
            const binary_string = window.atob(base64);
            const len = binary_string.length;
            const bytes = new Uint8Array(len);
            for (let i = 0; i < len; i++) {
                bytes[i] = binary_string.charCodeAt(i);
            }
            return bytes.buffer;
        }

        async function connectWallet() {
            if (window.ethereum) {
                web3 = new Web3(window.ethereum);
                try {
                    await window.ethereum.enable();
                    const accounts = await web3.eth.getAccounts();
                    document.getElementById('wallet-info').innerHTML = `Connected: ${accounts[0]}`;
                    updateBalance(accounts[0]);
                } catch (error) {
                    console.error("User denied account access");
                }
            } else {
                alert('Please install MetaMask!');
            }
        }

        function switchChain(chain) {
            if (chains[chain]) {
                currentChain = chain;
                web3 = new Web3(new Web3.providers.HttpProvider(chains[chain].provider));
                updateBalance(); // Update balance with new chain settings
            } else {
                console.error('Chain not supported');
            }
        }

        async function updateBalance() {
            const cosmicCoin = new web3.eth.Contract(cosmicCoinAbi, chains[currentChain].contractAddress);
            const accounts = await web3.eth.getAccounts();
            const balance = await cosmicCoin.methods.balanceOf(accounts[0]).call();
            document.getElementById('balance').innerHTML = `Balance: ${web3.utils.fromWei(balance, 'ether')} CosmicCoin (${currentChain})`;
        }

        async function sendCosmicCoin(event) {
            event.preventDefault();
            const recipient = document.getElementById('recipient-address').value;
            const amount = document.getElementById('amount').value;
            const cosmicCoin = new web3.eth.Contract(cosmicCoinAbi, chains[currentChain].contractAddress);
            const accounts = await web3.eth.getAccounts();
            try {
                await cosmicCoin.methods.transfer(recipient, web3.utils.toWei(amount, 'ether')).send({ from: accounts[0] });
                alert('Transaction successful');
            } catch (error) {
                console.error('Transaction failed', error);
                alert('Transaction failed');
            }
        }

        function copyToClipboard(id) {
            const text = document.getElementById(id).innerText;
            navigator.clipboard.writeText(text).then(() => {
                alert('Copied to clipboard');
            }, (err) => {
                console.error('Failed to copy text:', err);
            });
        }

        const chains = {
            'BSC': {
                provider: 'https://bsc-dataseed.binance.org/',
                contractAddress: cosmicCoinAddress
            },
            'ETH': {
                provider: 'https://mainnet.infura.io/v3/YOUR_INFURA_PROJECT_ID',
                contractAddress: '0x...ETH_CONTRACT_ADDRESS'
            }
            // Add other chains here
        };
    </script>
</body>
</html>
