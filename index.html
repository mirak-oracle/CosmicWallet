    const categories = [...new Set(dapps.map(dapp => dapp.category))];

    document.addEventListener("DOMContentLoaded", () => {
        const container = document.createElement("div");
        categories.forEach(category => {
            const categoryDiv = document.createElement("div");
            categoryDiv.classList.add("category");
            const categoryTitle = document.createElement("h2");
            categoryTitle.innerText = category;
            categoryDiv.appendChild(categoryTitle);
            dapps.filter(dapp => dapp.category === category).forEach(dapp => {
                const dappDiv = document.createElement("div");
                dappDiv.classList.add("dapp");
                const dappLink = document.createElement("a");
                dappLink.href = dapp.url;
                dappLink.innerText = `${dapp.name}: ${dapp.description}`;
                dappDiv.appendChild(dappLink);
                categoryDiv.appendChild(dappDiv);
            });
            container.appendChild(categoryDiv);
        });
        document.body.appendChild(container);
    });
</script>

</body>
</html>
