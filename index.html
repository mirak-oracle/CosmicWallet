<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CosmicWallet</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
            margin: 0;
            padding: 0;
        }
        .container {
            width: 90%;
            max-width: 800px;
            margin: auto;
            padding: 20px;
            background-color: white;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            border-radius: 8px;
        }
        .hidden {
            display: none;
        }
        .button {
            display: inline-block;
            padding: 10px 20px;
            margin: 10px 0;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        .button:disabled {
            background-color: #ccc;
        }
        .button.primary {
            background-color: #28a745;
        }
        .form-group {
            margin-bottom: 15px;
        }
        .form-group label {
            display: block;
            margin-bottom: 5px;
        }
        .form-group input {
            width: calc(100% - 22px);
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }
        .bottom-section {
            display: flex;
            justify-content: space-around;
            margin-top: 20px;
        }
        .bottom-section div {
            text-align: center;
        }
        .bottom-section button {
            background-color: #007bff;
            color: white;
            border: none;
            padding: 10px;
            border-radius: 5px;
            cursor: pointer;
        }
        .bottom-section button:hover {
            background-color: #0056b3;
        }
        .address-display {
            margin: 15px 0;
        }
        .address-display button {
            margin-top: 10px;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>CosmicWallet</h1>
    <div id="wallet-connect" class="hidden"></div>
    <div id="balance" class="hidden"></div>
    <button class="button" id="connectWallet">Connect Wallet</button>
    <button class="button" id="generateAddress">Generate New Address</button>
    <div id="address-info" class="address-display hidden">
        <p id="newAddress"></p>
        <p id="newMnemonic"></p>
        <button class="button" id="copyAddress">Copy Address</button>
    </div>

    <div class="form-group">
        <label for="recipient-address">Recipient</label>
        <input type="text" id="recipient-address">
    </div>
    <div class="form-group">
        <label for="amount">Amount</label>
        <input type="number" id="amount">
    </div>
    <button class="button primary" id="sendCosmicCoin">Send CosmicCoin</button>

    <div id="transaction-history" class="hidden"></div>
    
    <div class="max-w-md mx-auto mt-10 p-6 bg-white rounded-lg shadow-md">
    <div class="grid grid-cols-3 gap-4">
        <button class="bg-gray-300 py-2 px-4 rounded" onclick="showSection('dappsSection')">DApps</button>
        <button class="bg-gray-300 py-2 px-4 rounded" onclick="showSection('swapSection')">Swap</button>
        <button class="bg-gray-300 py-2 px-4 rounded" onclick="showSection('tradeSection')">Trade</button>
    </div>
</div>

<div id="dappsSection" class="max-w-md mx-auto mt-10 p-6 bg-white rounded-lg shadow-md hidden">
    <h2 class="text-xl font-bold mb-4">DApps</h2>
    <div class="section-container">
        <a href="https://app.uniswap.org/" target="_blank" class="link-card">Uniswap</a>
        <a href="https://pancakeswap.finance" target="_blank" class="link-card">PancakeSwap</a>
        <a href="https://app.aave.com/" target="_blank" class="link-card">Aave</a>
        <a href="https://app.compound.finance/" target="_blank" class="link-card">Compound</a>
        <a href="https://www.geckoterminal.com" target="_blank" class="link-card">GeckoTerminal</a>
        <a href="https://www.coinscope.co" target="_blank" class="link-card">Coinscope</a>
        <a href="https://www.dexview.com" target="_blank" class="link-card">DexView</a>
        <a href="https://www.dextools.io/" target="_blank" class="link-card">DexTools</a>
        <a href="https://top100token.com/" target="_blank" class="link-card">Top 100 Token</a>
    </div>
</div>

<div id="swapSection" class="max-w-md mx-auto mt-10 p-6 bg-white rounded-lg shadow-md hidden">
    <h2 class="text-xl font-bold mb-4">Swap</h2>
    <div class="section-container">
        <a href="https://app.uniswap.org/" target="_blank" class="link-card">Uniswap</a>
        <a href="https://app.1inch.io/" target="_blank" class="link-card">1inch</a>
        <a href="https://app.sushi.com/" target="_blank" class="link-card">SushiSwap</a>
    </div>
</div>

<div id="tradeSection" class="max-w-md mx-auto mt-10 p-6 bg-white rounded-lg shadow-md hidden">
    <h2 class="text-xl font-bold mb-4">Trade</h2>
    <div class="section-container">
        <a href="https://www.binance.com/" target="_blank" class="link-card">Binance</a>
        <a href="https://pro.coinbase.com/" target="_blank" class="link-card">Coinbase</a>
        <a href="https://www.kraken.com/" target="_blank" class="link-card">Kraken</a>
    </div>
</div>

<div id="qrScannerModal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center hidden">
    <div class="bg-white p-4 rounded-lg">
        <h2 class="text-xl font-bold mb-4">Scan QR Code</h2>
        <video id="qrVideo" class="w-full h-auto mb-4"></video>
        <button id="closeQrScanner" class="bg-red-500 text-white py-2 px-4 rounded">Close</button>
    
    </div>
</div>

<script src="https://cdn.ethers.io/lib/ethers-5.2.umd.min.js"></script>
<script src="https://cdn.web3js.org/web3js/1.7.0/web3.min.js"></script>
<script src="https://unpkg.com/@walletconnect/web3-provider@1.7.8/dist/umd/index.min.js"></script>
<script>
    let web3;
    const cosmicCoinAddresses = [
        "0x1957fEC12B41767322B5613DF087A41269ab05aD",
        "0x95e27971C1c72717612617D49045AAf947Be518C"
    ];
    const cosmicCoinAbi = [ /* Add your ABI here */ ];

    async function connectWallet() {
        if (window.ethereum) {
            web3 = new Web3(window.ethereum);
            try {
                await window.ethereum.request({ method: 'eth_requestAccounts' });
                const accounts = await web3.eth.getAccounts();
                document.getElementById('wallet-connect').innerHTML = `Connected: ${accounts[0]}`;
                document.getElementById('wallet-connect').classList.remove('hidden');
                await updateBalance(accounts[0]);
                await loadTransactionHistory(accounts[0]);
            } catch (error) {
                console.error("User denied account access");
            }
        } else {
            alert('Please install MetaMask!');
        }
    }

    async function updateBalance(account) {
        const cosmicCoin = new web3.eth.Contract(cosmicCoinAbi, cosmicCoinAddresses[0]); // You can switch to other addresses as needed
        const balance = await cosmicCoin.methods.balanceOf(account).call();
        document.getElementById('balance').innerHTML = `Balance: ${web3.utils.fromWei(balance, 'ether')} CosmicCoin`;
        document.getElementById('balance').classList.remove('hidden');
    }

    async function sendCosmicCoin(event) {
        event.preventDefault();
        const recipient = document.getElementById('recipient-address').value;
        const amount = document.getElementById('amount').value;
        const accounts = await web3.eth.getAccounts();
        const cosmicCoin = new web3.eth.Contract(cosmicCoinAbi, cosmicCoinAddresses[0]); // You can switch to other addresses as needed
        await cosmicCoin.methods.transfer(recipient, web3.utils.toWei(amount, 'ether')).send({ from: accounts[0] });
        alert('Transaction successful');
        await updateBalance(accounts[0]);
    }

    async function loadTransactionHistory(account) {
        document.getElementById('transaction-history').innerHTML = 'Transaction history feature coming soon...';
        document.getElementById('transaction-history').classList.remove('hidden');
    }

    async function generateAddress() {
        const wallet = ethers.Wallet.createRandom();
        document.getElementById('newAddress').textContent = `New Wallet Address: ${wallet.address}`;
        document.getElementById('newMnemonic').textContent = `Mnemonic: ${wallet.mnemonic.phrase}`;
        document.getElementById('address-info').classList.remove('hidden');
    }

    function copyAddress() {
        const address = document.getElementById('newAddress').textContent.split(': ')[1];
        navigator.clipboard.writeText(address).then(() => {
            alert('Address copied to clipboard!');
        });
    }
function showSection(sectionId) {
        document.querySelectorAll('.max-w-md').forEach(section => {
            section.classList.add('hidden');
        });
        document.getElementById(sectionId).classList.remove('hidden');
    }

    const qrScanner = new QrScanner(
        qrVideo,
        result => {
            document.getElementById('recipient').value = result;
            qrScanner.stop();
            qrScannerModal.classList.add('hidden');
        }
    );

    function openQrScanner() {
        qrScannerModal.classList.remove('hidden');
        qrScanner.start();
    }
    
    function setupWalletConnect() {
        const provider = new WalletConnectProvider.default({
            infuraId: "YOUR_INFURA_ID" // Replace with your Infura ID
        });
        provider.enable().then(() => {
            web3 = new Web3(provider);
            web3.eth.getAccounts().then(accounts => {
                document.getElementById('wallet-connect').innerHTML = `Connected: ${accounts[0]}`;
                document.getElementById('wallet-connect').classList.remove('hidden');
                updateBalance(accounts[0]);
            });
        });
    }

    document.getElementById('connectWallet').addEventListener('click', connectWallet);
    document.getElementById('generateAddress').addEventListener('click', generateAddress);
    document.getElementById('copyAddress').addEventListener('click', copyAddress);
    document.getElementById('sendCosmicCoin').addEventListener('click', sendCosmicCoin);
    document.getElementById('dappsButton').addEventListener('click', () => { /* Add functionality for DApps */ });
    document.getElementById('tradeButton').addEventListener('click', () => { /* Add functionality for Trade */ });
    document.getElementById('swapButton').addEventListener('click', () => { /* Add functionality for Swap */ });

    // Call this function if you want to set up WalletConnect
    // setupWalletConnect();
</script>
</body>
</html>
