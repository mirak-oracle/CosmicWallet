    async function generateSecretPhrase() {
      const wallet = ethers.Wallet.createRandom();
      document.getElementById('secret-phrase').innerHTML = `

      `;

    async function encryptData(data, password) {
      const enc = new TextEncoder();
      const key = await window.crypto.subtle.importKey(
        'raw',
        enc.encode(password),
        { name: 'PBKDF2' },
        false,
        ['deriveKey']
      );
      const derivedKey = await window.crypto.subtle.deriveKey(
        {
          name: 'PBKDF2',
          salt: enc.encode('some-salt'),
          iterations: 100000,
          hash: 'SHA-256'
        },
        key,
        { name: 'AES-GCM', length: 256 },
        false,
        ['encrypt']
      );
      const encrypted = await window.crypto.subtle.encrypt(
        {
          name: 'AES-GCM',
          iv: window.crypto.getRandomValues(new Uint8Array(12))
        },
        derivedKey,
        enc.encode(data)
      );
      return encrypted;
    }

    async function storeEncryptedData(data, password) {
      const encrypted = await encryptData(data, password);
      localStorage.setItem('encryptedData', JSON.stringify(encrypted));
    }

    async function retrieveEncryptedData(password) {
      const encryptedData = JSON.parse(localStorage.getItem('encryptedData'));
      return await decryptData(encryptedData, password);
    }

    async function decryptData(encryptedData, password) {
      const enc = new TextEncoder();
      const key = await window.crypto.subtle.importKey(
        'raw',
        enc.encode(password),
        { name: 'PBKDF2' },
        false,
        ['deriveKey']
      );
      const derivedKey = await window.crypto.subtle.deriveKey(

          hash: 'SHA-256'
        },
        key,
        { name: 'AES-GCM', length: 256 },
        false,
        ['decrypt']
      );
      const decrypted = await window.crypto.subtle.decrypt(
        {
          name: 'AES-GCM',
          iv: encryptedData.iv
        },
        derivedKey,
        encryptedData
      );
      return new TextDecoder().decode(decrypted);
    }
